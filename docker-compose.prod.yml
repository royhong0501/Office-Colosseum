services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-colosseum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-colosseum}
      - POSTGRES_DB=${POSTGRES_DB:-colosseum}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colosseum} -d ${POSTGRES_DB:-colosseum}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-colosseum}:${POSTGRES_PASSWORD:-colosseum}@postgres:5432/${POSTGRES_DB:-colosseum}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_INITIAL_USERNAME=${ADMIN_INITIAL_USERNAME:-admin}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
