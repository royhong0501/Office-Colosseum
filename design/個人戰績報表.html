<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1240" />
<title>HiiiCalc — 個人戰績報表</title>
<link rel="stylesheet" href="styles/base.css" />
<style>
  body {
    background: #efeadf; color: #2c241a;
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 20px;
  }
  .host { width: 1200px; }
</style>
</head>
<body>

<div class="host" data-screen-label="個人戰績報表" id="screen-stats"></div>

<!-- Tweaks 面板 -->
<div class="tweaks-panel" id="tweaks" style="display:none">
  <div class="tp-head">
    TWEAKS · 配色主題
    <span class="tp-close" onclick="document.getElementById('tweaks').style.display='none'">×</span>
  </div>
  <div class="tp-body">
    <label>主題</label>
    <div class="theme-row">
      <div class="theme-chip active" style="background:#c7bba0; color:#2c241a" data-theme="">暖棕米白</div>
      <div class="theme-chip" style="background:#3e5a42" data-theme="office-green">辦公綠</div>
      <div class="theme-chip" style="background:#2f3e52" data-theme="corp-blue">冷灰藍</div>
    </div>
    <div style="font-size:10.5px; color:var(--ink-muted); line-height:1.5">
      切換後所有區塊同步改色。<br/>按 <b>Esc</b> 可關閉面板（老闆鍵示意）。
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/SheetWindow.jsx"></script>
<script type="text/babel" src="components/ScreenStatsV2.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("screen-stats")).render(<ScreenStatsV2 />);
</script>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": ""
  }/*EDITMODE-END*/;

  function applyTheme(t) {
    if (t) document.documentElement.setAttribute("data-theme", t);
    else document.documentElement.removeAttribute("data-theme");
    document.querySelectorAll(".theme-chip").forEach(c => {
      c.classList.toggle("active", (c.getAttribute("data-theme") || "") === t);
    });
  }
  applyTheme(TWEAK_DEFAULTS.theme || "");

  document.querySelectorAll(".theme-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const t = chip.getAttribute("data-theme") || "";
      applyTheme(t);
      try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { theme: t } }, "*"); } catch(e) {}
    });
  });

  window.addEventListener("message", (e) => {
    const d = e.data || {};
    if (d.type === "__activate_edit_mode") document.getElementById("tweaks").style.display = "block";
    else if (d.type === "__deactivate_edit_mode") document.getElementById("tweaks").style.display = "none";
  });
  try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(e) {}

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      const t = document.getElementById("tweaks");
      if (t.style.display !== "none") t.style.display = "none";
    }
  });
</script>

</body>
</html>
